name: Change Gate (WBGL)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    env:
      WBGL_DB_DRIVER: pgsql
      WBGL_DB_HOST: 127.0.0.1
      WBGL_DB_PORT: 5432
      WBGL_DB_NAME: wbgl
      WBGL_DB_USER: wbgl_user
      WBGL_DB_PASS: ${{ secrets.WBGL_CI_DB_PASSWORD }}
      WBGL_DB_SSLMODE: disable
      WBGL_GOVERNANCE_STRICT: ${{ vars.WBGL_GOVERNANCE_STRICT }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wbgl_user
          POSTGRES_PASSWORD: ${{ secrets.WBGL_CI_DB_PASSWORD }}
          POSTGRES_DB: wbgl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wbgl_user -d wbgl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert CI DB secret
        run: |
          set -euo pipefail
          if [ -z "${WBGL_DB_PASS}" ]; then
            echo "WBGL_CI_DB_PASSWORD secret is required."
            exit 1
          fi

      - name: Read PR body
        id: pr
        run: |
          body="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate required PR fields
        env:
          PR_BODY: ${{ steps.pr.outputs.body }}
        run: |
          set -euo pipefail
          missing=0
          required=("PLAN-REF:" "GAP-REF:" "LAYER:" "RISK:" "ROLLBACK:" "TEST-EVIDENCE:" "IMPACTED FEATURES:" "DOC-UPDATES:" "REUSE-REF:" "CHANGE-TYPE:" "STABILITY-REFS:")
          for key in "${required[@]}"; do
            if ! grep -qi "$key" <<<"$PR_BODY"; then
              echo "Missing required field: $key"
              missing=1
            fi
          done

          if ! grep -Eqi 'PLAN-REF:.*WBGL_MASTER_UPGRADE_PLAN' <<<"$PR_BODY"; then
            echo "PLAN-REF must reference WBGL_MASTER_UPGRADE_PLAN."
            missing=1
          fi

          if ! grep -Eqi 'GAP-REF:.*(FINAL_MISSING_FEATURES_MATRIX|final_missing_features_matrix|WBGL_BG_Full_Feature_Census|differential_analysis)' <<<"$PR_BODY"; then
            echo "GAP-REF must reference the comparison corpus (matrix/census/differential)."
            missing=1
          fi

          valid_layers='(Architectural|Structural|Logical|Operational|Security|Governance|UX|Data)'
          if ! grep -Eqi "LAYER:.*$valid_layers" <<<"$PR_BODY"; then
            echo "LAYER must include one or more valid values: Architectural/Structural/Logical/Operational/Security/Governance/UX/Data."
            missing=1
          fi

          if ! grep -Eqi 'REUSE-REF:.*(app/|api/|app/Scripts/|Docs/|docs/)' <<<"$PR_BODY"; then
            echo "REUSE-REF must mention existing WBGL paths used as implementation seeds."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Collect changed files
        id: changes
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}:${{ github.base_ref }}"
          files="$(git diff --name-only "${{ github.base_ref }}...HEAD")"
          statuses="$(git diff --name-status "${{ github.base_ref }}...HEAD")"
          printf "%s\n" "$files"
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
            echo "statuses<<EOF"
            echo "$statuses"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Enforce phase-1 feature freeze gate
        env:
          WBGL_CHANGED_FILES: ${{ steps.changes.outputs.files }}
          WBGL_CHANGED_STATUSES: ${{ steps.changes.outputs.statuses }}
          WBGL_PR_BODY: ${{ steps.pr.outputs.body }}
        run: php app/Scripts/stability-freeze-gate.php

      - name: Require execution loop status refresh for sensitive changes
        env:
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: |
          set -euo pipefail
          sensitive='^(api/|app/|app/Scripts/|partials/|templates/|views/|public/js/|public/css/|database/migrations/)'
          if grep -Eq "$sensitive" <<<"$CHANGED_FILES"; then
            if ! grep -Eq '^Docs/WBGL-EXECUTION-STATE-AR\.json$' <<<"$CHANGED_FILES"; then
              echo "Sensitive code changed but Docs/WBGL-EXECUTION-STATE-AR.json was not refreshed."
              echo "Run: php app/Scripts/sequential-execution.php guard and commit the updated state if needed."
              exit 1
            fi
          fi

      - name: Enforce sequential execution state baseline
        run: |
          set -euo pipefail
          status_file="Docs/WBGL-EXECUTION-STATE-AR.json"
          if [ ! -f "$status_file" ]; then
            echo "Missing $status_file."
            echo "Run: php app/Scripts/sequential-execution.php guard and commit Docs/WBGL-EXECUTION-STATE-AR.json."
            exit 1
          fi
          php app/Scripts/sequential-execution.php guard
          pending_count="$(jq '[.steps[] | select(.status == "pending")] | length' "$status_file")"
          in_progress_count="$(jq '[.steps[] | select(.status == "in_progress")] | length' "$status_file")"
          blocked_count="$(jq '[.steps[] | select(.status == "blocked")] | length' "$status_file")"

          if [ "$blocked_count" -ne 0 ]; then
            echo "Sequential execution has blocked steps. Resolve or unblock before merge."
            exit 1
          fi

          if [ "$pending_count" -gt 0 ] && [ "$in_progress_count" -ne 1 ]; then
            echo "Sequential execution must have exactly one in_progress step while pending steps exist."
            exit 1
          fi

          if [ "$pending_count" -eq 0 ] && [ "$in_progress_count" -ne 0 ]; then
            echo "Sequential execution cannot keep in_progress steps when no pending steps remain."
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pgsql, pdo_pgsql, fileinfo
          coverage: none

      - name: Theme style audit (generate report artifact)
        run: php app/Scripts/theme-style-audit.php scan

      - name: Theme style gate (block new style violations)
        run: php app/Scripts/theme-style-audit.php gate

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Apply DB migrations
        run: php app/Scripts/migrate.php

      - name: Run PHPUnit Unit suite
        run: vendor/bin/phpunit --testsuite Unit

      - name: Run PHPUnit Integration suite
        run: vendor/bin/phpunit --testsuite Integration

      - name: Run governance reports (strict mode optional)
        run: |
          set -euo pipefail
          STRICT_MODE="${WBGL_GOVERNANCE_STRICT:-0}"
          if [ "${STRICT_MODE}" = "1" ]; then
            php app/Scripts/data-integrity-check.php --strict-warn --output-json=storage/logs/data-integrity-report.json --output-md=storage/logs/data-integrity-report.md
            php app/Scripts/permissions-drift-report.php --strict --output-json=storage/logs/permissions-drift-report.json --output-md=storage/logs/permissions-drift-report.md
          else
            php app/Scripts/data-integrity-check.php --output-json=storage/logs/data-integrity-report.json --output-md=storage/logs/data-integrity-report.md
            php app/Scripts/permissions-drift-report.php --output-json=storage/logs/permissions-drift-report.json --output-md=storage/logs/permissions-drift-report.md
          fi
          php app/Scripts/governance-summary.php --drift=storage/logs/permissions-drift-report.json --integrity=storage/logs/data-integrity-report.json --output-md=storage/logs/governance-summary.md

      - name: Release gate (strict)
        run: php app/Scripts/release-gate.php --integrity=storage/logs/data-integrity-report.json --drift=storage/logs/permissions-drift-report.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install E2E dependencies
        run: |
          set -euo pipefail
          npm ci
          npx playwright install chromium

      - name: Seed E2E fixtures
        run: php app/Scripts/seed-e2e-fixtures.php

      - name: Run Playwright smoke suite
        run: npm run test:e2e

      - name: Enforce API auth bootstrap on changed endpoints
        env:
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: |
          set -euo pipefail

          api_files="$(grep -E '^api/.*\.php$' <<<"$CHANGED_FILES" || true)"
          if [ -z "$api_files" ]; then
            echo "No API endpoint changes detected."
            exit 0
          fi

          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue

            case "$f" in
              api/login.php|api/logout.php|api/_bootstrap.php)
                # Public/auth bootstrap files are intentionally excluded.
                continue
                ;;
            esac

            if ! grep -Eq '_bootstrap\.php' "$f"; then
              echo "API guard failed: $f must include api/_bootstrap.php."
              fail=1
              continue
            fi

            if ! grep -Eq 'wbgl_api_require_login|wbgl_api_require_permission' "$f"; then
              echo "API guard failed: $f must call wbgl_api_require_login() or wbgl_api_require_permission()."
              fail=1
            fi
          done <<< "$api_files"

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

      - name: Require docs updates for sensitive changes
        env:
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: |
          set -euo pipefail
          sensitive='^(api/|app/|app/Scripts/|partials/|templates/|views/|public/js/|public/css/)'
          if grep -Eq "$sensitive" <<<"$CHANGED_FILES"; then
            if ! grep -Eq '^(Docs/|docs/)' <<<"$CHANGED_FILES"; then
              echo "Sensitive code changed, but no Docs/ updates detected."
              echo "Please update Docs/ with behavior/contract/risk changes."
              exit 1
            fi
          fi

      - name: Require justification for new sensitive files
        env:
          CHANGED_STATUSES: ${{ steps.changes.outputs.statuses }}
          PR_BODY: ${{ steps.pr.outputs.body }}
        run: |
          set -euo pipefail

          added_sensitive="$(awk '$1 ~ /^A/ {print $2}' <<<"$CHANGED_STATUSES" | grep -E '^(api/|app/|app/Scripts/|views/|partials/|templates/|public/js/|public/css/)' || true)"
          if [ -z "$added_sensitive" ]; then
            echo "No newly added sensitive files."
            exit 0
          fi

          echo "New sensitive files detected:"
          printf "%s\n" "$added_sensitive"

          if ! grep -Eqi 'NEW-SURFACE-JUSTIFICATION:' <<<"$PR_BODY"; then
            echo "Missing NEW-SURFACE-JUSTIFICATION in PR body for new sensitive files."
            exit 1
          fi
